<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Use — локальный агент</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Левая колонка: Список моделей -->
        <div class="sidebar-left">
            <div class="brand">
                <div class="brand-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <span>Browser Use</span>
            </div>
            <p class="section-label">Доступные модели</p>
            <ul class="model-list" id="modelList">
                <!-- Будет заполнено через JavaScript -->
            </ul>
        </div>

        <!-- Центральная область: Чат и Браузер -->
        <div class="main-content">
            <!-- Левая часть: Чат -->
            <div class="chat-area">
                <div class="chat-header" id="currentModelTitle">
                    Выберите модель для начала
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-card" id="welcomeMessage">
                        <div class="welcome-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                            </svg>
                        </div>
                        <h3>Готов к работе</h3>
                        <p>Выберите модель слева и настройте её справа для начала работы</p>
                    </div>
                </div>
                <div class="chat-input-wrapper">
                    <textarea 
                        id="chatInput" 
                        placeholder="Введите задачу для агента..." 
                        disabled
                        rows="1"
                    ></textarea>
                    <button id="sendButton" class="btn-send" disabled onclick="sendMessage()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- Правая часть: Браузер -->
            <div class="browser-area">
                <div class="browser-header">
                    <span>Браузер агента</span>
                </div>
                <div class="browser-container" id="browserContainer">
                    <div class="browser-placeholder" id="browserPlaceholder">
                        <div class="browser-placeholder-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                                <line x1="8" y1="21" x2="16" y2="21"></line>
                                <line x1="12" y1="17" x2="12" y2="21"></line>
                            </svg>
                        </div>
                        <p>Браузер появится здесь после запуска задачи</p>
                    </div>
                    <img id="browserScreenshot" class="browser-screenshot" style="display: none;" alt="Browser screenshot">
                </div>
            </div>
        </div>

        <!-- Правая колонка: Настройки -->
        <div class="sidebar-right">
            <h2>Настройки</h2>
            <div id="settingsContainer">
                <div class="no-model-card">
                    <p>Выберите модель для настройки</p>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
